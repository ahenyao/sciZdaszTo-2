      - name: Restore
        run: dotnet restore ZdaszToApp/ZdaszToApp.Desktop/ZdaszToApp.Desktop.csproj

      - name: Build
        run: dotnet publish -c Release -f net9.0 ZdaszToApp/ZdaszToApp.Desktop/ZdaszToApp.Desktop.csproj

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-release
          path: ZdaszToApp/ZdaszToApp.Desktop/bin/Release/net9.0



  build-macos-x64-release:
    name: macOS x64 Release
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.304


      - name: Restore
        run: dotnet restore ZdaszToApp/ZdaszToApp.Desktop/ZdaszToApp.Desktop.csproj

      - name: Build
        run: dotnet publish -c Release -f net9.0 ZdaszToApp/ZdaszToApp.Desktop/ZdaszToApp.Desktop.csproj

