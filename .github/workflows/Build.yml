on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build-win-x64-release:
    name: Windows x64 Release
    runs-on: windows-2025
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.304


      - name: Restore
        run: dotnet restore ZdaszToApp\ZdaszToApp.Desktop\ZdaszToApp.Desktop.csproj

      - name: Build
        run: dotnet publish -c Release -f net9.0 ZdaszToApp\ZdaszToApp.Desktop\ZdaszToApp.Desktop.csproj

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: win-x64-release
          path: ZdaszToApp\ZdaszToApp.Desktop\bin\Release\net9.0



  build-win-arm64-release:
    name: Windows arm64 Release
    runs-on: windows-11-arm
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.304


      - name: Restore
        run: dotnet restore ZdaszToApp\ZdaszToApp.Desktop\ZdaszToApp.Desktop.csproj

      - name: Build
        run: dotnet publish -c Release -f net9.0 ZdaszToApp\ZdaszToApp.Desktop\ZdaszToApp.Desktop.csproj

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: win-arm64-release
          path: ZdaszToApp\ZdaszToApp.Desktop\bin\Release\net9.0



