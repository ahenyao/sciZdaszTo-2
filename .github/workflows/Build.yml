on:
  push:
    branches: [ "*" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "*" ]

permissions:
  contents: write

jobs:
  build-win-x64-release:
    name: Windows x64 Release
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.304

      - name: Restore
        run: dotnet restore ZdaszToApp\ZdaszToApp.Desktop\ZdaszToApp.Desktop.csproj

      - name: Build
        run: dotnet publish -c Release -f net9.0 -p:SelfContained=true -p:PublishSingleFile=true -p:DebugType=None -p:DebugSymbols=false ZdaszToApp\ZdaszToApp.Desktop\ZdaszToApp.Desktop.csproj

      - name: Package
        run: |
          mkdir release
          powershell Compress-Archive -Path ZdaszToApp\ZdaszToApp.Desktop\bin\Release\net9.0\win-x64\publish\* -DestinationPath release\win-x64-release.zip

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: win-x64-release
          path: release/win-x64-release.zip


  build-win-arm64-release:
    name: Windows arm64 Release
    runs-on: windows-11-arm

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.304

      - name: Restore
        run: dotnet restore ZdaszToApp\ZdaszToApp.Desktop\ZdaszToApp.Desktop.csproj

      - name: Build
        run: dotnet publish -c Release -f net9.0 -p:SelfContained=true -p:PublishSingleFile=true -p:DebugType=None -p:DebugSymbols=false ZdaszToApp\ZdaszToApp.Desktop\ZdaszToApp.Desktop.csproj

      - name: Package
        run: |
          mkdir release
          powershell Compress-Archive -Path ZdaszToApp\ZdaszToApp.Desktop\bin\Release\net9.0\win-arm64\publish\* -DestinationPath release\win-arm64-release.zip

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: win-arm64-release
          path: release/win-arm64-release.zip


  build-linux-x64-release:
    name: Linux x64 Release
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.304

      - name: Restore
        run: dotnet restore ZdaszToApp/ZdaszToApp.Desktop/ZdaszToApp.Desktop.csproj

      - name: Build
        run: dotnet publish -c Release -f net9.0 -p:SelfContained=true -p:PublishSingleFile=true -p:DebugType=None -p:DebugSymbols=false ZdaszToApp/ZdaszToApp.Desktop/ZdaszToApp.Desktop.csproj

      - name: Package
        run: |
          mkdir release
          cd ZdaszToApp/ZdaszToApp.Desktop/bin/Release/net9.0/linux-x64/publish
          zip -r ../../../../../../../release/linux-x64-release.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-release
          path: release/linux-x64-release.zip


  build-linux-arm64-release:
    name: Linux arm64 Release
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.304

      - name: Restore
        run: dotnet restore ZdaszToApp/ZdaszToApp.Desktop/ZdaszToApp.Desktop.csproj

      - name: Build
        run: dotnet publish -c Release -f net9.0 -p:SelfContained=true -p:PublishSingleFile=true -p:DebugType=None -p:DebugSymbols=false ZdaszToApp/ZdaszToApp.Desktop/ZdaszToApp.Desktop.csproj

      - name: Package
        run: |
          mkdir release
          cd ZdaszToApp/ZdaszToApp.Desktop/bin/Release/net9.0/linux-arm64/publish
          zip -r ../../../../../../../release/linux-arm64-release.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-release
          path: release/linux-arm64-release.zip


  build-macos-x64-release:
    name: macOS x64 Release
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.304

      - name: Restore
        run: dotnet restore ZdaszToApp/ZdaszToApp.Desktop/ZdaszToApp.Desktop.csproj

      - name: Build
        run: dotnet publish -c Release -f net9.0 -p:SelfContained=true -p:PublishSingleFile=true -p:DebugType=None -p:DebugSymbols=false ZdaszToApp/ZdaszToApp.Desktop/ZdaszToApp.Desktop.csproj

      - name: Package
        run: |
          mkdir release
          cd ZdaszToApp/ZdaszToApp.Desktop/bin/Release/net9.0/osx-x64/publish
          zip -r ../../../../../../../release/macos-x64-release.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-release
          path: release/macos-x64-release.zip


  build-macos-arm64-release:
    name: macOS arm64 Release
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.304

      - name: Restore
        run: dotnet restore ZdaszToApp/ZdaszToApp.Desktop/ZdaszToApp.Desktop.csproj

      - name: Build
        run: dotnet publish -c Release -f net9.0 -p:SelfContained=true -p:PublishSingleFile=true -p:DebugType=None -p:DebugSymbols=false ZdaszToApp/ZdaszToApp.Desktop/ZdaszToApp.Desktop.csproj

      - name: Package
        run: |
          mkdir release
          cd ZdaszToApp/ZdaszToApp.Desktop/bin/Release/net9.0/osx-arm64/publish
          zip -r ../../../../../../../release/macos-arm64-release.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-release
          path: release/macos-arm64-release.zip


  build-android-noarch-release:
    name: Android noarch Release
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.304

      - name: Install Android workload
        run: dotnet workload install android

      - name: Restore
        run: dotnet restore ZdaszToApp/ZdaszToApp.Android/ZdaszToApp.Android.csproj

      - name: Build
        run: dotnet publish -c Release -f net9.0-android ZdaszToApp/ZdaszToApp.Android/ZdaszToApp.Android.csproj /p:AndroidPackageFormat=apk /p:RunAOTCompilation=false /p:PublishTrimmed=false

      - name: Copy non-signed apk file
        run: |
          mkdir sign_tmp
          cp ZdaszToApp/ZdaszToApp.Android/bin/Release/net9.0-android/com.sciplusplus2026.zdasztoapp.apk sign_tmp

      - uses: ilharp/sign-android-release@v2
        name: Sign app APK
        id: sign_app
        with:
          releaseDir: sign_tmp
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          buildToolsVersion: 36.0.0

      - uses: actions/upload-artifact@v4
        with:
          name: android-noarch-release
          path: ${{steps.sign_app.outputs.signedFile}}


  release:
    name: Create Release with all builds
    runs-on: ubuntu-latest
    needs:
      - build-win-x64-release
      - build-win-arm64-release
      - build-linux-x64-release
      - build-linux-arm64-release
      - build-macos-x64-release
      - build-macos-arm64-release
      - build-android-noarch-release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release folder
        run: mkdir release

      - name: Collect files
        run: |
          find . -name "*.zip" -exec cp {} release/ \;
          find . -name "*.apk" -exec cp {} release/ \;

      - name: Create release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: release/*
